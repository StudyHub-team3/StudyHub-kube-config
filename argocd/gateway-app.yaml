apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-app
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/StudyHub-team3/StudyHub-api-gateway.git
      targetRevision: HEAD
      path: .kube
    - repoURL: https://github.com/StudyHub-team3/StudyHub-kube-config.git
      targetRevision: HEAD
      path: services/gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
