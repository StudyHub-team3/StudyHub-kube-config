apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: common-environment
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://github.com/StudyHub-team3/StudyHub-kube-config.git
    targetRevision: HEAD
    path: environments/default
  - repoURL: https://github.com/StudyHub-team3/StudyHub-kube-config.git
    targetRevision: HEAD
    path: services/middleware
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true